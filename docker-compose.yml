# ============================================
# PlagSini EV — Local Development (Hot-Reload)
# Usage: docker compose up -d
#
# Volume mounts enabled — edit code locally,
# changes auto-detected (no rebuild needed).
#
# Only rebuild when dependencies change:
#   docker compose up -d --build
# ============================================

services:
  mysql:
    image: mysql:8.0
    container_name: charging-platform-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-charging_platform}
      - MYSQL_USER=${MYSQL_USER:-charging_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-charging_password}
    ports:
      # Bind MySQL to localhost only (not externally reachable).
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init_docker_mysql.sql:/docker-entrypoint-initdb.d/02-init-extra.sql:ro
    networks:
      - ev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  charging-platform:
    build:
      context: ./ChargingPlatform
      dockerfile: Dockerfile
    container_name: charging-platform
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      # ── Dev volume mount: local code → container ──
      # Edit files locally, uvicorn --reload picks up changes automatically.
      # Only requirements.txt / Dockerfile changes need rebuild.
      - ./ChargingPlatform:/app
      - charging-platform-data:/app/data
    # Override CMD with --reload for dev hot-reload
    # uvicorn watches /app for file changes and auto-restarts
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app"]
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-charging_user}:${MYSQL_PASSWORD:-charging_password}@mysql:3306/${MYSQL_DATABASE:-charging_platform}
      - PYTHONUNBUFFERED=1
      - DEV_AUTO_INIT=1
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_EMAIL=${SMTP_EMAIL:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-PlagSini EV}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - OCPP_REQUIRE_AUTH=${OCPP_REQUIRE_AUTH:-1}
      - OCPP_SHARED_TOKEN=${OCPP_SHARED_TOKEN:-}
      - OCPP_CHARGER_TOKENS=${OCPP_CHARGER_TOKENS:-}
      - PAYMENT_CALLBACK_SECRET=${PAYMENT_CALLBACK_SECRET:-}
      - PAYMENT_BILLPLZ_API_KEY=${PAYMENT_BILLPLZ_API_KEY:-}
      - PAYMENT_BILLPLZ_API_SECRET=${PAYMENT_BILLPLZ_API_SECRET:-}
      - PAYMENT_FIUU_API_KEY=${PAYMENT_FIUU_API_KEY:-}
      - PAYMENT_FIUU_API_SECRET=${PAYMENT_FIUU_API_SECRET:-}
      - PAYMENT_TNG_API_KEY=${PAYMENT_TNG_API_KEY:-}
      - PAYMENT_TNG_API_SECRET=${PAYMENT_TNG_API_SECRET:-}
      - PAYMENT_OCBC_API_KEY=${PAYMENT_OCBC_API_KEY:-}
      - PAYMENT_OCBC_API_SECRET=${PAYMENT_OCBC_API_SECRET:-}
      - ALLOW_DB_GATEWAY_SECRETS=${ALLOW_DB_GATEWAY_SECRETS:-0}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - STAFF_EMAIL=${STAFF_EMAIL:-}
      - STAFF_PASSWORD=${STAFF_PASSWORD:-}
      - STAFF_NAME=${STAFF_NAME:-Staff Admin}
    networks:
      - ev-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  customer-service:
    build:
      context: ./CustomerService
      dockerfile: Dockerfile
    container_name: customer-service
    ports:
      - "8001:8001"
    volumes:
      # ── Dev volume mount: local code → container ──
      - ./CustomerService:/app
    # Override CMD with --reload for dev hot-reload
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--reload-dir", "/app"]
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-charging_user}:${MYSQL_PASSWORD:-charging_password}@mysql:3306/customer_service
      - PYTHONUNBUFFERED=1
      - CHARGING_PLATFORM_URL=http://charging-platform:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    networks:
      - ev-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  appev:
    build:
      context: ./AppEV
      dockerfile: Dockerfile
    container_name: appev
    ports:
      - "3000:80"
    # Note: Flutter web uses multi-stage build (build → Nginx static).
    # Volume mount not practical here — rebuild needed for Flutter changes:
    #   docker compose build appev && docker compose up -d appev
    networks:
      - ev-network
    depends_on:
      - charging-platform
    restart: unless-stopped

  # ── Loki — Log storage & indexing ──────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Promtail — Log collector (reads Docker container logs → sends to Loki) ──
  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - ev-network
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana — Dashboard & alerting UI ──────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      # Bind to localhost only — access via SSH tunnel or VPN, NOT public internet
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://%(domain)s/monitoring/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_LOG_LEVEL=warn
      # Security hardening
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_SECURITY_X_CONTENT_TYPE_OPTIONS=true
      - GF_SECURITY_X_XSS_PROTECTION=true
    networks:
      - ev-network
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

networks:
  ev-network:
    driver: bridge

volumes:
  charging-platform-data:
  mysql-data:
  loki-data:
  grafana-data:
