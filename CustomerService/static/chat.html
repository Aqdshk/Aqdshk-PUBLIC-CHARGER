<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlagSini Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  :root {
    --bg:       #07111d;
    --surface:  #0d1f30;
    --card:     #112030;
    --border:   rgba(255,255,255,0.07);
    --green:    #7ed321;
    --green2:   #4caf50;
    --cyan:     #00e5ff;
    --text:     #e8edf2;
    --text2:    rgba(255,255,255,0.4);
    --red:      #ff5252;
    --user-bg:  linear-gradient(135deg,#5da815,#7ed321);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ═══════════════════════════════
     HEADER
  ═══════════════════════════════ */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo-wrap {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #1a4a10, #2d7a1a);
    border: 1.5px solid rgba(126,211,33,0.45);
    box-shadow: 0 0 16px rgba(126,211,33,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-wrap svg { width: 26px; height: 26px; }

  .header-info { flex: 1; min-width: 0; }

  .header-info h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
    line-height: 1.2;
  }

  .header-info h1 span { color: var(--green); }

  .header-info p {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
    font-weight: 500;
  }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(126,211,33,0.1);
    border: 1px solid rgba(126,211,33,0.25);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
    flex-shrink: 0;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%,100% { opacity:1; box-shadow: 0 0 4px var(--green); }
    50%      { opacity:0.5; box-shadow: 0 0 10px var(--green); }
  }

  /* ═══════════════════════════════
     NAV TABS
  ═══════════════════════════════ */
  .nav-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-tab {
    flex: 1;
    padding: 11px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .nav-tab .material-icons-round { font-size: 16px; }
  .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .nav-tab:hover:not(.active) { color: var(--text); }

  /* ═══════════════════════════════
     CHAT AREA
  ═══════════════════════════════ */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* ═══════════════════════════════
     MESSAGES
  ═══════════════════════════════ */
  .msg {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  /* Bot avatar */
  .bot-avatar-sm {
    width: 34px; height: 34px;
    border-radius: 11px;
    background: linear-gradient(135deg, #1a4a10, #2d7a1a);
    border: 1px solid rgba(126,211,33,0.4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 10px rgba(126,211,33,0.2);
  }

  .bot-avatar-sm svg { width: 20px; height: 20px; }

  /* User avatar */
  .user-avatar-sm {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .user-avatar-sm .material-icons-round {
    font-size: 18px;
    color: var(--text2);
  }

  /* Bubbles */
  .bubble {
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.65;
    word-break: break-word;
  }

  .msg.bot .bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #5da815, #7ed321);
    color: #fff;
    border-top-right-radius: 4px;
    font-weight: 500;
  }

  .bubble strong { color: var(--green); font-weight: 700; }
  .msg.user .bubble strong { color: #fff; }

  /* ─── Category buttons ─── */
  .categories {
    display: flex; flex-wrap: wrap; gap: 7px;
    margin-top: 12px;
  }

  .cat-btn {
    padding: 8px 14px;
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 20px;
    color: var(--cyan);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }

  .cat-btn:hover {
    background: rgba(0,229,255,0.14);
    border-color: var(--cyan);
    box-shadow: 0 0 10px rgba(0,229,255,0.15);
  }

  /* ─── Question buttons ─── */
  .question-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    padding: 10px 13px;
    margin-top: 6px;
    background: rgba(126,211,33,0.05);
    border: 1px solid rgba(126,211,33,0.14);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .question-btn::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    opacity: 0.7;
  }

  .question-btn:hover {
    background: rgba(126,211,33,0.1);
    border-color: var(--green);
    color: #fff;
    padding-left: 16px;
  }

  /* ─── Suggestion chips ─── */
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 10px;
  }

  .sug-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px;
    background: rgba(126,211,33,0.07);
    border: 1px solid rgba(126,211,33,0.18);
    border-radius: 20px;
    color: var(--green);
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sug-btn:hover {
    background: rgba(126,211,33,0.14);
    border-color: var(--green);
  }

  .sug-btn.ticket-btn {
    border-color: rgba(0,229,255,0.25);
    color: var(--cyan);
    background: rgba(0,229,255,0.07);
  }

  .sug-btn.ticket-btn:hover {
    background: rgba(0,229,255,0.14);
    border-color: var(--cyan);
  }

  .sug-btn .material-icons-round { font-size: 14px; }

  /* ─── Typing indicator ─── */
  .typing-wrap {
    display: flex; gap: 10px;
    align-self: flex-start;
    animation: fadeUp 0.25s ease;
  }

  .typing-bubble {
    display: flex; gap: 5px; align-items: center;
    padding: 13px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
  }

  .typing-bubble span {
    width: 7px; height: 7px;
    background: var(--cyan);
    border-radius: 50%;
    animation: bounce 1.3s infinite;
    opacity: 0.7;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity:0.4; }
    40%          { transform: translateY(-7px); opacity:1; }
  }

  /* ═══════════════════════════════
     INPUT AREA
  ═══════════════════════════════ */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }

  .input-area input {
    flex: 1;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-area input:focus {
    border-color: rgba(126,211,33,0.4);
    box-shadow: 0 0 0 3px rgba(126,211,33,0.08);
  }

  .input-area input::placeholder { color: rgba(255,255,255,0.2); }

  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #5da815, #7ed321);
    border: none;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(126,211,33,0.3);
    flex-shrink: 0;
  }

  .send-btn .material-icons-round { font-size: 20px; color: #fff; }

  .send-btn:hover {
    box-shadow: 0 6px 20px rgba(126,211,33,0.45);
    transform: translateY(-1px);
  }

  .send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ═══════════════════════════════
     TICKETS PANEL
  ═══════════════════════════════ */
  .tickets-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .tickets-panel::-webkit-scrollbar { width: 4px; }
  .tickets-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .email-search {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .email-search p {
    font-size: 13px;
    color: var(--text2);
    font-weight: 500;
  }

  .email-row {
    display: flex;
    gap: 8px;
  }

  .email-row input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .email-row input:focus { border-color: rgba(126,211,33,0.35); }

  .email-row button {
    background: linear-gradient(135deg, #5da815, #7ed321);
    border: none;
    border-radius: 11px;
    padding: 0 18px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
  }

  .ticket-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ticket-card:hover {
    border-color: rgba(126,211,33,0.2);
    background: rgba(126,211,33,0.04);
  }

  .ticket-card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .ticket-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.5px;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 10px;
    border: 1px solid;
  }

  .ticket-subject {
    font-size: 13.5px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }

  .ticket-meta {
    font-size: 11px;
    color: var(--text2);
  }

  /* ═══════════════════════════════
     MODAL
  ═══════════════════════════════ */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    justify-content: center;
    align-items: flex-end;
    padding: 0;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    margin: 0 auto 20px;
  }

  .modal h3 {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal h3 .material-icons-round {
    color: var(--green);
    font-size: 20px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    margin-top: 14px;
    display: block;
  }

  .modal input,
  .modal textarea,
  .modal select {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .modal input:focus,
  .modal textarea:focus,
  .modal select:focus {
    border-color: rgba(126,211,33,0.4);
  }

  .modal textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .modal select option { background: #0d1f30; }

  .btn-row {
    display: flex; gap: 10px;
    margin-top: 20px;
  }

  .btn-cancel {
    padding: 13px 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 13px;
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  .btn-submit {
    flex: 1;
    background: linear-gradient(135deg, #5da815, #7ed321);
    border: none;
    border-radius: 13px;
    padding: 13px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 16px rgba(126,211,33,0.3);
    transition: all 0.2s;
  }

  .btn-submit:hover { box-shadow: 0 6px 20px rgba(126,211,33,0.45); }

  /* ═══════════════════════════════
     TIMESTAMP
  ═══════════════════════════════ */
  .msg-time {
    font-size: 10px;
    color: var(--text2);
    margin-top: 4px;
    padding: 0 4px;
    align-self: flex-end;
  }

  .msg.bot  .msg-time { align-self: flex-start; margin-left: 44px; }
  .msg.user .msg-time { align-self: flex-end; }

  /* ═══════════════════════════════
     DIVIDER (date/time)
  ═══════════════════════════════ */
  .day-divider {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px;
    color: var(--text2);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .day-divider::before, .day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ═══════════════════════════════
     WELCOME SPLASH (first load)
  ═══════════════════════════════ */
  .welcome-splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 16px;
    gap: 10px;
  }

  .splash-logo {
    width: 64px; height: 64px;
    border-radius: 20px;
    background: linear-gradient(135deg, #1a4a10, #2d7a1a);
    border: 2px solid rgba(126,211,33,0.4);
    box-shadow: 0 0 24px rgba(126,211,33,0.25);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }

  .splash-logo svg { width: 38px; height: 38px; }

  .splash-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    background: linear-gradient(135deg, #7ed321, #00d977, #88ffd0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }

  .splash-sub {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="logo-wrap">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 2L4.5 13.5H11.5L11 22L19.5 10.5H12.5L13 2Z"
        fill="url(#bolt)" stroke="rgba(126,211,33,0.6)" stroke-width="0.5" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="bolt" x1="4.5" y1="2" x2="19.5" y2="22" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#a8e063"/>
          <stop offset="100%" stop-color="#56ab2f"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  <div class="header-info">
    <h1>Plag<span>Sini</span> Assistant</h1>
    <p>AI-Powered Support · EV Charging</p>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    Online
  </div>
</div>

<!-- ── Nav Tabs ── -->
<div class="nav-tabs">
  <div class="nav-tab active" id="tabChat" onclick="switchTab('chat')">
    <span class="material-icons-round">chat_bubble_outline</span> Chat
  </div>
  <div class="nav-tab" id="tabTickets" onclick="switchTab('tickets')">
    <span class="material-icons-round">confirmation_number</span> My Tickets
  </div>
</div>

<!-- ── Chat Area ── -->
<div class="chat-area" id="chatArea"></div>

<!-- ── Tickets Panel ── -->
<div class="tickets-panel" id="ticketsPanel">
  <div class="email-search">
    <p>Enter your email to view your support tickets:</p>
    <div class="email-row">
      <input id="ticketEmailInput" type="email" placeholder="your@email.com"
        onkeydown="if(event.key==='Enter') loadTickets()">
      <button onclick="loadTickets()">View</button>
    </div>
  </div>
  <div id="ticketsList"></div>
</div>

<!-- ── Input ── -->
<div class="input-area" id="inputArea">
  <input type="text" id="msgInput" placeholder="Type your message..."
    onkeydown="if(event.key==='Enter') sendMsg()">
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">
    <span class="material-icons-round">send</span>
  </button>
</div>

<!-- ── Ticket Modal ── -->
<div class="modal-overlay" id="ticketModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>
      <span class="material-icons-round">confirmation_number</span>
      Create Support Ticket
    </h3>

    <span class="field-label">Email *</span>
    <input id="tEmail" type="email" placeholder="your@email.com">

    <span class="field-label">Name</span>
    <input id="tName" placeholder="Your name (optional)">

    <span class="field-label">Subject *</span>
    <input id="tSubject" placeholder="Brief summary of your issue">

    <span class="field-label">Category</span>
    <select id="tCategory">
      <option value="general">❓ General</option>
      <option value="login_account">🔐 Login & Account</option>
      <option value="charging">⚡ Charging Issues</option>
      <option value="wallet_payment">💳 Wallet & Payment</option>
      <option value="vehicle">🚗 Vehicle</option>
      <option value="rewards">🎁 Rewards</option>
      <option value="app_issue">📱 App Problems</option>
    </select>

    <span class="field-label">Description *</span>
    <textarea id="tDesc" placeholder="Describe your issue in detail..."></textarea>

    <div class="btn-row">
      <button class="btn-cancel" onclick="closeTicketModal()">Cancel</button>
      <button class="btn-submit" onclick="submitTicket()">Submit Ticket</button>
    </div>
  </div>
</div>

<!-- ── SVG bolt icon template (reuse in JS) ── -->
<template id="boltSvg">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M13 2L4.5 13.5H11.5L11 22L19.5 10.5H12.5L13 2Z"
      fill="url(#bolt2)" stroke="rgba(126,211,33,0.5)" stroke-width="0.5" stroke-linejoin="round"/>
    <defs>
      <linearGradient id="bolt2" x1="4.5" y1="2" x2="19.5" y2="22" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#a8e063"/>
        <stop offset="100%" stop-color="#56ab2f"/>
      </linearGradient>
    </defs>
  </svg>
</template>

<script>
const API = window.location.origin;
let sessionId = null;
let currentCategory = null;
let categoriesCache = {};

// ─── Utils ───
function escHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function fmtMarkdown(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function timeFmt() {
  return new Date().toLocaleTimeString('en-MY', { hour:'2-digit', minute:'2-digit' });
}

function boltAvatarHtml() {
  return `<div class="bot-avatar-sm">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M13 2L4.5 13.5H11.5L11 22L19.5 10.5H12.5L13 2Z"
        fill="url(#b${Math.random().toString(36).slice(2,6)})"
        stroke="rgba(126,211,33,0.5)" stroke-width="0.5" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="b${Math.random().toString(36).slice(2,6)}" x1="4.5" y1="2" x2="19.5" y2="22">
          <stop offset="0%" stop-color="#a8e063"/>
          <stop offset="100%" stop-color="#56ab2f"/>
        </linearGradient>
      </defs>
    </svg>
  </div>`;
}

// ─── Build message elements ───
function addBotMessage(text, categories = null, questions = null, suggestions = null, isSplash = false) {
  const chatArea = document.getElementById('chatArea');

  if (isSplash) {
    const splash = document.createElement('div');
    splash.className = 'welcome-splash';
    splash.innerHTML = `
      <div class="splash-logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M13 2L4.5 13.5H11.5L11 22L19.5 10.5H12.5L13 2Z"
            fill="url(#bsplash)" stroke="rgba(126,211,33,0.5)" stroke-width="0.4" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="bsplash" x1="4.5" y1="2" x2="19.5" y2="22">
              <stop offset="0%" stop-color="#c8f07a"/><stop offset="100%" stop-color="#56ab2f"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="splash-title">PlagSini Assistant</div>
      <div class="splash-sub">Your AI support for EV charging — available 24/7</div>`;
    chatArea.appendChild(splash);
  }

  const id = 'bot' + Date.now();
  const msg = document.createElement('div');
  msg.className = 'msg bot';

  let inner = `${boltAvatarHtml()}<div class="bubble" id="${id}">`;
  inner += fmtMarkdown(text);

  if (categories && categories.length) {
    inner += `<div class="categories">`;
    categories.forEach(cat => {
      inner += `<button class="cat-btn" onclick="selectCategory('${cat.id}')">${cat.label}</button>`;
    });
    inner += `</div>`;
  }

  if (questions && questions.length) {
    questions.forEach(q => {
      inner += `<button class="question-btn" onclick="askQuestion('${escHtml(q.text).replace(/'/g,"&#39;")}')">${escHtml(q.text)}</button>`;
    });
  }

  if (suggestions && suggestions.length) {
    inner += `<div class="suggestions">`;
    suggestions.forEach(s => {
      if (s.toLowerCase().includes('ticket')) {
        inner += `<button class="sug-btn ticket-btn" onclick="openTicketModal()">
          <span class="material-icons-round">confirmation_number</span>${s}</button>`;
      } else {
        inner += `<button class="sug-btn" onclick="askQuestion('${escHtml(s).replace(/'/g,"&#39;")}')">${s}</button>`;
      }
    });
    inner += `</div>`;
  }

  inner += `</div>`;
  msg.innerHTML = inner;
  chatArea.appendChild(msg);

  // Timestamp
  const ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = timeFmt();
  chatArea.appendChild(ts);

  chatArea.scrollTop = chatArea.scrollHeight;
}

function addUserMessage(text) {
  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `
    <div class="user-avatar-sm"><span class="material-icons-round">person</span></div>
    <div class="bubble">${escHtml(text)}</div>`;
  chatArea.appendChild(msg);

  const ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = timeFmt();
  chatArea.appendChild(ts);

  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `${boltAvatarHtml()}
    <div class="typing-bubble">
      <span></span><span></span><span></span>
    </div>`;
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ─── Init ───
async function init() {
  try {
    const res = await fetch(`${API}/api/bot/welcome`, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      if (data.data.categories) {
        data.data.categories.forEach(c => categoriesCache[c.id] = c);
      }
      addBotMessage(data.data.message, data.data.categories, null, null, true);
    }
  } catch(e) {
    addBotMessage("⚠️ Unable to connect. Please refresh and try again.");
  }
}

// ─── Send message ───
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addUserMessage(text);
  showTyping();

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/api/bot/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId, category: currentCategory })
    });
    const data = await res.json();
    hideTyping();

    if (data.success) {
      sessionId = data.data.session_id;

      if (data.data.type === 'greeting') {
        const cats = Object.keys(categoriesCache).length > 0 ? Object.values(categoriesCache) : null;
        addBotMessage(data.data.message, cats, null, data.data.suggestions || null);
      } else {
        addBotMessage(data.data.message, null, null, data.data.suggestions || null);
        if (data.data.needs_ticket) {
          setTimeout(() => openTicketModal(), 700);
        }
      }
    }
  } catch(err) {
    hideTyping();
    addBotMessage("Sorry, connection issue. Please try again. 🔄");
  }

  btn.disabled = false;
  input.focus();
}

async function selectCategory(catId) {
  currentCategory = catId;
  const label = document.querySelector(`[onclick="selectCategory('${catId}')"]`)?.textContent || catId;
  addUserMessage(label);
  showTyping();

  try {
    const res = await fetch(`${API}/api/bot/category`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category_id: catId })
    });
    const data = await res.json();
    hideTyping();
    if (data.success) {
      addBotMessage(data.data.message, null, data.data.questions);
    }
  } catch(err) {
    hideTyping();
    addBotMessage("Something went wrong. Please try again.");
  }
}

function askQuestion(text) {
  document.getElementById('msgInput').value = text;
  sendMsg();
}

// ─── Tabs ───
function switchTab(tab) {
  document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
  document.getElementById('tabTickets').classList.toggle('active', tab === 'tickets');

  const chatArea = document.getElementById('chatArea');
  const ticketsPanel = document.getElementById('ticketsPanel');
  const inputArea = document.getElementById('inputArea');

  if (tab === 'chat') {
    chatArea.style.display = 'flex';
    ticketsPanel.style.display = 'none';
    inputArea.style.display = 'flex';
  } else {
    chatArea.style.display = 'none';
    ticketsPanel.style.display = 'flex';
    inputArea.style.display = 'none';
  }
}

// ─── Ticket Modal ───
function openTicketModal() {
  document.getElementById('ticketModal').classList.add('show');
  if (currentCategory) document.getElementById('tCategory').value = currentCategory;
}

function closeTicketModal() {
  document.getElementById('ticketModal').classList.remove('show');
}

// Close modal on overlay click
document.getElementById('ticketModal').addEventListener('click', function(e) {
  if (e.target === this) closeTicketModal();
});

async function submitTicket() {
  const email    = document.getElementById('tEmail').value.trim();
  const name     = document.getElementById('tName').value.trim();
  const subject  = document.getElementById('tSubject').value.trim();
  const category = document.getElementById('tCategory').value;
  const desc     = document.getElementById('tDesc').value.trim();

  if (!email || !subject || !desc) {
    alert('Please fill in Email, Subject, and Description.');
    return;
  }

  try {
    const res = await fetch(`${API}/api/bot/escalate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name, subject, category, description: desc })
    });
    const data = await res.json();
    closeTicketModal();

    if (data.success) {
      addBotMessage(
        `✅ **Ticket berjaya dibuat!**\n\n` +
        `📋 Ticket ID: **${data.data.ticket_number}**\n` +
        `📂 Kategori: ${data.data.category}\n` +
        `🔴 Prioriti: ${data.data.priority.toUpperCase()}\n\n` +
        `📧 Konfirmasi telah dihantar ke **${email}**.\n` +
        `Team kami akan respond mengikut prioriti.`
      );
    } else {
      addBotMessage(`❌ Gagal buat ticket: ${data.message || 'Unknown error'}`);
    }
  } catch(err) {
    closeTicketModal();
    addBotMessage("❌ Network error. Sila cuba lagi.");
  }
}

// ─── Load Tickets ───
async function loadTickets() {
  const email = document.getElementById('ticketEmailInput').value.trim();
  if (!email) return;

  const list = document.getElementById('ticketsList');
  list.innerHTML = '<p style="color:var(--text2);text-align:center;padding:20px;font-size:13px;">Loading...</p>';

  const statusColors = {
    open: '#00e5ff', in_progress: '#FFD700',
    waiting_user: '#FF8800', resolved: '#7ed321', closed: '#555'
  };

  try {
    const res = await fetch(`${API}/api/tickets?email=${encodeURIComponent(email)}`);
    const data = await res.json();

    if (data.success && data.data.tickets.length > 0) {
      list.innerHTML = '';
      data.data.tickets.forEach(t => {
        const color = statusColors[t.status] || '#888';
        const date  = new Date(t.created_at).toLocaleDateString('en-MY', {
          year:'numeric', month:'short', day:'numeric'
        });
        const card = document.createElement('div');
        card.className = 'ticket-card';
        card.onclick = () => viewTicket(t.id);
        card.innerHTML = `
          <div class="ticket-card-top">
            <span class="ticket-num">${t.ticket_number}</span>
            <span class="status-badge" style="color:${color};border-color:${color};background:${color}18">
              ${t.status.replace('_',' ')}
            </span>
          </div>
          <div class="ticket-subject">${escHtml(t.subject)}</div>
          <div class="ticket-meta">${date} · ${t.priority.toUpperCase()} · ${t.category}</div>`;
        list.appendChild(card);
      });
    } else {
      list.innerHTML = '<p style="color:var(--text2);text-align:center;padding:30px;font-size:13px;">No tickets found for this email.</p>';
    }
  } catch(err) {
    list.innerHTML = '<p style="color:var(--red);text-align:center;padding:20px;font-size:13px;">Failed to load tickets.</p>';
  }
}

async function viewTicket(id) {
  const list = document.getElementById('ticketsList');
  list.innerHTML = '<p style="color:var(--text2);text-align:center;padding:20px;font-size:13px;">Loading...</p>';

  try {
    const res = await fetch(`${API}/api/tickets/${id}`);
    const data = await res.json();
    if (!data.success) return;

    const t = data.data;
    let html = `
      <button onclick="loadTickets()" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);
        border-radius:10px;padding:8px 16px;color:var(--text2);font-family:'Inter',sans-serif;
        font-size:13px;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;gap:6px;">
        ← Back to tickets
      </button>
      <div class="ticket-card" style="cursor:default;margin-bottom:12px;">
        <div class="ticket-num" style="margin-bottom:6px;">${t.ticket_number}</div>
        <div class="ticket-subject" style="font-size:15px;margin-bottom:8px;">${escHtml(t.subject)}</div>
        <div class="ticket-meta">Status: ${t.status} · Priority: ${t.priority} · ${t.category}</div>
      </div>`;

    t.messages.forEach(m => {
      const isUser   = m.sender_type === 'user';
      const isSystem = m.sender_type === 'system';
      const bg       = isSystem ? 'rgba(0,229,255,0.04)' : isUser ? 'rgba(126,211,33,0.04)' : 'rgba(255,255,255,0.02)';
      const border   = isSystem ? 'rgba(0,229,255,0.15)' : isUser ? 'rgba(126,211,33,0.15)' : 'var(--border)';
      const label    = isSystem ? '#00e5ff' : isUser ? '#7ed321' : '#FFD700';
      const date     = new Date(m.created_at).toLocaleString('en-MY');
      html += `
        <div style="background:${bg};border:1px solid ${border};border-radius:12px;padding:12px 14px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="color:${label};font-size:12px;font-weight:700;">${escHtml(m.sender_name || m.sender_type)}</span>
            <span style="color:var(--text2);font-size:10px;">${date}</span>
          </div>
          <p style="font-size:13px;line-height:1.55;color:var(--text);${isSystem?'font-style:italic;color:var(--text2);':''}">${escHtml(m.message)}</p>
        </div>`;
    });

    list.innerHTML = html;
  } catch(err) { console.error(err); }
}

// ─── Start ───
init();
</script>
</body>
</html>
