# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=monitoring_limit:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    listen [::]:80;
    server_name charger.czeros.tech;

    location /static/firmware/ {
        proxy_pass http://localhost:8000/static/firmware/;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name charger.czeros.tech;

    ssl_certificate /etc/letsencrypt/live/charger.czeros.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/charger.czeros.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Max 20 connections per IP
    limit_conn conn_limit 20;

    # ─── Maintenance page fallback ───────────────────────────────────────────
    # When upstream (FastAPI / AppEV / chatbot) returns a gateway error,
    # serve maintenance.html instead of Nginx's default 502/503/504 page so
    # customers see a friendly branded message + retry button + WhatsApp
    # contact. Auto-refresh in the page tries the real route every 30s, so
    # they're redirected back to the live app the moment it returns.
    error_page 502 503 504 /__maintenance.html;
    location = /__maintenance.html {
        root /var/www/plagsini;
        internal;          # not directly reachable, only via error_page
        add_header Cache-Control "no-store" always;
    }

    # Auth endpoints — strict (5 req/min)
    location ~ ^/api/(auth|login|register|verify|otp) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;  # let Nginx serve maintenance.html on 5xx
    }

    # General API — 30 req/min
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Staff-Token $http_x_staff_token;
        proxy_intercept_errors on;
    }

    # OCPP WebSocket — no rate limit (chargers need persistent connection)
    location /ocpp/ {
        proxy_pass http://localhost:9000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # AppEV Flutter Web App (port 3000 blocked externally)
    location /app/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:3000/app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
    }

    # Customer Service Bot (behind Nginx — port 8001 blocked externally)
    location /bot/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
    }

    # Grafana Monitoring Dashboard
    location /monitoring/ {
        limit_req zone=monitoring_limit burst=30 nodelay;
        proxy_pass http://localhost:3001/monitoring/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
