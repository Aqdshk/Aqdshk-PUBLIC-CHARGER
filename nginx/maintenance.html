<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A1A">
  <title>PlagSini EV — Under Maintenance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at top, #0d1f33 0%, #050a14 60%, #000 100%);
      color: #e8eef5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: rgba(15, 25, 40, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 136, 0.15);
      border-radius: 20px;
      padding: 48px 36px;
      text-align: center;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6),
                  0 0 60px -20px rgba(0, 255, 136, 0.2);
    }
    .logo {
      width: 140px;
      height: auto;
      margin: 0 auto 28px;
      display: block;
      filter: drop-shadow(0 0 24px rgba(0, 255, 136, 0.3));
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 24px rgba(0, 255, 136, 0.3)); }
      50%      { filter: drop-shadow(0 0 36px rgba(0, 255, 136, 0.5)); }
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }
    .message {
      font-size: 16px;
      line-height: 1.7;
      color: rgba(232, 238, 245, 0.85);
      margin-bottom: 32px;
    }
    .message strong { color: #00FF88; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      font-family: inherit;
      background: linear-gradient(135deg, #00FF88 0%, #00AA55 100%);
      color: #000;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 255, 136, 0.3); }
    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(232, 238, 245, 0.08);
      font-size: 11px;
      color: rgba(232, 238, 245, 0.4);
      letter-spacing: 0.5px;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 24px; }
      .message { font-size: 15px; }
      .logo { width: 110px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/__maintenance-logo.png" alt="PlagSini EV" class="logo">

    <h1>System Under Maintenance</h1>

    <p class="message">
      Our team is performing <strong>scheduled maintenance</strong> on the system.
      Please try again in a few minutes. Active charging sessions are not affected.
    </p>

    <button class="btn" onclick="location.reload()">Try Again</button>

    <div class="footer">
      © PlagSini EV · We'll be back shortly
    </div>
  </div>
</body>
</html>
