server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── All Docker containers (dev + prod names) ────────────────────────────────
  # Discovers every container and maps job label by name pattern:
  #   nginx / plagsini-nginx          → nginx
  #   charging-platform / plagsini-api → charging-platform
  #   customer-service / plagsini-bot  → customer-service
  #   appev / plagsini-web             → appev
  #   *mysql*                          → mysql
  - job_name: docker-all
    docker_sd_configs:
      - host: tcp://docker-socket-proxy:2375
        refresh_interval: 5s

    relabel_configs:
      # Keep raw container name as a label
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container

      # Drop promtail/loki/grafana containers (monitoring stack itself)
      - source_labels: [container]
        regex: '(promtail|loki|grafana)'
        action: drop

      # Map container name → job label (dev and prod names)
      - source_labels: [container]
        regex: '(nginx|plagsini-nginx)'
        target_label: job
        replacement: nginx

      - source_labels: [container]
        regex: '(charging-platform|plagsini-api)'
        target_label: job
        replacement: charging-platform

      - source_labels: [container]
        regex: '(customer-service|plagsini-bot)'
        target_label: job
        replacement: customer-service

      - source_labels: [container]
        regex: '(appev|plagsini-web)'
        target_label: job
        replacement: appev

      - source_labels: [container]
        regex: '.*mysql.*'
        target_label: job
        replacement: mysql

      # Drop containers that didn't match any job (no job label set)
      - source_labels: [job]
        regex: '.+'
        action: keep

    pipeline_stages:
      # Nginx: extract HTTP method + status for dashboard filters
      - match:
          selector: '{job="nginx"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<request>[^"]*)" (?P<status>\d+) (?P<body_bytes_sent>\d+)'
            - labels:
                status:
                method:

      # ChargingPlatform: tag security-sensitive log lines
      - match:
          selector: '{job="charging-platform"}'
          stages:
            - regex:
                expression: '(?i)(?P<security_event>AUDIT|login_failed|rejected|invalid.*token|blocked|unauthorized)'
                source: __raw
            - labels:
                security_event:
