# ============================================
# PlagSini EV — Production (Google Cloud)
# Usage:
#   1. Copy .env.example → .env and fill in values
#   2. Run: docker compose -f docker-compose.prod.yml up -d
# ============================================

services:

  # ── Nginx Reverse Proxy + SSL ──
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: plagsini-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
    networks:
      - ev-network
    depends_on:
      - charging-platform
      - customer-service
      - appev
    restart: always

  # ── Let's Encrypt SSL Auto-Renewal ──
  certbot:
    image: certbot/certbot:latest
    container_name: plagsini-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renew every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: always

  # ── MySQL Database ──
  mysql:
    image: mysql:8.0
    container_name: plagsini-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./ChargingPlatform/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ev-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Security: Don't expose MySQL port externally in production
    # ports:
    #   - "3306:3306"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── ChargingPlatform (Main Backend) ──
  charging-platform:
    build:
      context: ./ChargingPlatform
      dockerfile: Dockerfile
    container_name: plagsini-api
    ports:
      - "0.0.0.0:8000:8000"   # Expose 8000 for firmware download (charger needs http://IP:8000/static/firmware/)
      - "0.0.0.0:9000:9000"   # OCPP WebSocket
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - PYTHONUNBUFFERED=1
      # Email
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-PlagSini EV}
      # Auth
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - APP_BASE_URL=${APP_BASE_URL}
      # Admin accounts
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - STAFF_EMAIL=${STAFF_EMAIL}
      - STAFF_PASSWORD=${STAFF_PASSWORD}
      - STAFF_NAME=${STAFF_NAME:-Staff Admin}
      # OCPP WebSocket
      - OCPP_REQUIRE_AUTH=${OCPP_REQUIRE_AUTH:-1}
      - OCPP_SHARED_TOKEN=${OCPP_SHARED_TOKEN:-}
      - OCPP_CHARGER_TOKENS=${OCPP_CHARGER_TOKENS:-}
      # Payment gateways
      - PAYMENT_CALLBACK_SECRET=${PAYMENT_CALLBACK_SECRET:-}
      - PAYMENT_BILLPLZ_API_KEY=${PAYMENT_BILLPLZ_API_KEY:-}
      - PAYMENT_BILLPLZ_API_SECRET=${PAYMENT_BILLPLZ_API_SECRET:-}
      - PAYMENT_FIUU_API_KEY=${PAYMENT_FIUU_API_KEY:-}
      - PAYMENT_FIUU_API_SECRET=${PAYMENT_FIUU_API_SECRET:-}
      - PAYMENT_TNG_API_KEY=${PAYMENT_TNG_API_KEY:-}
      - PAYMENT_TNG_API_SECRET=${PAYMENT_TNG_API_SECRET:-}
      - PAYMENT_OCBC_API_KEY=${PAYMENT_OCBC_API_KEY:-}
      - PAYMENT_OCBC_API_SECRET=${PAYMENT_OCBC_API_SECRET:-}
      - ALLOW_DB_GATEWAY_SECRETS=${ALLOW_DB_GATEWAY_SECRETS:-0}
      # OCPI (TNG roaming)
      - OCPI_BASE_URL=${OCPI_BASE_URL:-}
      - OCPI_TOKEN=${OCPI_TOKEN:-}
      - OCPI_PARTY_ID=${OCPI_PARTY_ID:-PLG}
      - OCPI_COUNTRY_CODE=${OCPI_COUNTRY_CODE:-MY}
      - OCPI_LOCATION_ADDRESS=${OCPI_LOCATION_ADDRESS:-}
      - OCPI_LOCATION_CITY=${OCPI_LOCATION_CITY:-Kuala Lumpur}
      - OCPI_LOCATION_POSTAL=${OCPI_LOCATION_POSTAL:-50000}
      - OCPI_LOCATION_LAT=${OCPI_LOCATION_LAT:-3.1390}
      - OCPI_LOCATION_LON=${OCPI_LOCATION_LON:-101.6869}
    volumes:
      - ./ChargingPlatform/static/firmware:/app/static/firmware
    networks:
      - ev-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Customer Service Bot ──
  customer-service:
    build:
      context: ./CustomerService
      dockerfile: Dockerfile
    container_name: plagsini-bot
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - PYTHONUNBUFFERED=1
      - CHARGING_PLATFORM_URL=http://charging-platform:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - ev-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Flutter Web App ──
  appev:
    build:
      context: ./AppEV
      dockerfile: Dockerfile
      args:
        - API_BASE_URL=${API_BASE_URL}
        - BOT_BASE_URL=${BOT_BASE_URL}
    container_name: plagsini-web
    networks:
      - ev-network
    depends_on:
      - charging-platform
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  ev-network:
    driver: bridge

volumes:
  mysql-data:
  certbot-webroot:
  certbot-certs:
