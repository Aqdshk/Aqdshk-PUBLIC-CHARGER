<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <!-- viewport-fit=cover is REQUIRED for iOS PWA to extend content under the notch/status bar -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Chrome / Android — colour the browser chrome & address-bar strip -->
  <meta name="theme-color" content="#0A0A1A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- black-translucent lets our scaffold paint under the status bar (dark) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PlagSini EV">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PlagSini EV</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0A0A1A;
      /* Extend safe-area insets so status bar / notch area paints dark */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    /* But actually we want Flutter to paint under safe area — remove padding, keep bg */
    html, body { padding: 0 !important; }
  </style>
</head>
<body style="background-color: #0A0A1A;">
  <script>
    // Register PWA Service Worker for Web Push Notifications
    // SW is served from /app/push-sw.js (same path as the app base-href)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('push-sw.js', {scope: './'}).then(function(reg) {
        console.log('Push SW registered:', reg.scope);
      }).catch(function(err) {
        console.warn('Push SW registration failed:', err);
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
