server {
    listen 80;
    index index.html;

    # Flutter web built with --base-href /app/
    # alias strips the /app/ prefix so files are served from html root
    location /app/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /app/index.html;
    }

    # Redirect root to /app/
    location = / {
        return 301 /app/;
    }

    location /api/ {
        proxy_pass http://charging-platform:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
